<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing 3D Multiplayer - WebAssembly</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            z-index: 1000;
        }

        #loading h1 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        #loading p {
            margin-top: 0.5rem;
            opacity: 0.8;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #container {
            width: 100%;
            height: 100%;
        }

        #stats {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 0.5rem;
            font-size: 0.85rem;
            line-height: 1.5;
            max-width: 200px;
            border: 1px solid #00ff00;
            z-index: 100;
        }

        .stat-label {
            color: #00ff00;
            font-weight: bold;
        }

        .stat-value {
            color: #ffff00;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="loading">
        <h1>Racing 3D Multiplayer</h1>
        <div class="spinner"></div>
        <p>Loading WebAssembly...</p>
        <p id="loadingStatus">Initializing...</p>
    </div>

    <div id="stats" style="display: none;">
        <div><span class="stat-label">FPS:</span> <span class="stat-value" id="fps">60</span></div>
        <div><span class="stat-label">Frame Time:</span> <span class="stat-value" id="frameTime">0.0</span> ms</div>
        <div><span class="stat-label">Status:</span> <span class="stat-value" id="status">Running</span></div>
    </div>

    <script>
        console.log('[index.js] Page loaded, initializing...');

        let gameModule = null;
        let frameCount = 0;
        let lastFPSUpdate = Date.now();
        let currentFPS = 60;

        // Try to load the Emscripten module
        const moduleScript = document.createElement('script');
        moduleScript.async = true;
        moduleScript.src = 'web3dgame.js';  // Generated by Emscripten

        moduleScript.onerror = function() {
            console.error('[index.js] Failed to load web3dgame.js');
            document.getElementById('loadingStatus').textContent = 'Error: Failed to load WebAssembly module';
        };

        moduleScript.onload = function() {
            console.log('[index.js] web3dgame.js loaded, waiting for Module initialization...');
        };

        document.body.appendChild(moduleScript);

        // Emscripten will inject Module global when the script loads
        // We wait for it to signal that the game is ready
        window.onModuleReady = function() {
            console.log('[index.js] Emscripten module initialized successfully');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('stats').style.display = 'block';
            gameModule = window.Module;

            // Start FPS counter
            updateFPS();
        };

        window.onModuleError = function(message) {
            console.error('[index.js] Module error:', message);
            document.getElementById('loadingStatus').textContent = 'Error: ' + message;
        };

        function updateFPS() {
            frameCount++;
            const now = Date.now();
            const elapsed = now - lastFPSUpdate;

            if (elapsed >= 1000) {
                currentFPS = Math.round(frameCount * 1000 / elapsed);
                document.getElementById('fps').textContent = currentFPS;
                frameCount = 0;
                lastFPSUpdate = now;
            }

            requestAnimationFrame(updateFPS);
        }

        // Fallback: if Module doesn't signal ready after 5 seconds, show error
        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (loading.style.display !== 'none') {
                console.warn('[index.js] Module did not initialize within timeout');
                // Module might still be loading; don't fail yet
            }
        }, 5000);
    </script>
</body>
</html>
